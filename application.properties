spring.application.name=carrier-integration-shipment-workflow-system

server.port=8080

# Default local database: H2
spring.datasource.url=jdbc:h2:mem:carrierdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# For MySQL, replace the datasource values:
# spring.datasource.url=jdbc:mysql://localhost:3306/carrierdb
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto=update
